<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Text to Speech</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Browser Reader</p>
          <h1 class="title">PDF Text to Speech</h1>
        </div>
        <button id="upgrade" class="chip-btn">Get plan</button>
      </section>

      <section class="status-panel">
        <div class="status-head">
          <p id="status" class="status">Ready</p>
          <span class="live-dot" aria-hidden="true"></span>
        </div>
        <p id="hint" class="hint">Upload a .pdf file to start reading.</p>
      </section>

      <input id="fileInput" class="hidden-input" type="file" accept=".pdf,application/pdf" />

      <button id="openFile" class="file-btn">Open PDF File</button>

      <section class="controls-panel">
        <button id="play" class="primary">Read Aloud</button>
        <div class="controls-row">
          <button id="pause" class="secondary" disabled>Pause</button>
          <button id="stop" class="secondary" disabled>Stop</button>
          <label class="speed">
            <span class="speed-label">Speed</span>
            <select id="speed" aria-label="Playback speed">
              <option value="0.75">0.75x</option>
              <option value="1" selected>1x</option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
            </select>
          </label>
        </div>
      </section>

      <button id="limitUpgrade" class="upgrade-btn hidden">Upgrade for unlimited listening</button>

      <p class="mini-disclosure">
        PDF text is sent to pdftext2speech.com and OpenAI to generate audio.
      </p>

      <div class="footer-links">
        <button id="contact" class="link-btn">Contact us</button>
      </div>
    </main>
    <section id="paywallModal" class="paywall-modal hidden">
      <div class="paywall-sheet">
        <div class="paywall-top">
          <div>
            <p class="paywall-kicker">Unlimited listening</p>
            <h2 class="paywall-title">Choose your plan</h2>
          </div>
          <button id="closePaywall" class="paywall-close" aria-label="Close paywall">×</button>
        </div>
        <p id="paywallStatus" class="paywall-status">Checking subscription status...</p>
        <div id="paywallPlans" class="paywall-plans">
          <button class="plan-card selected" data-plan-id="monthly">
            <span class="plan-main">
              <span class="plan-name">1-MONTH PLAN</span>
              <span class="plan-total">$9.99 per month</span>
            </span>
            <span class="plan-side">
              <span class="plan-day-price">$0.33</span>
              <span class="plan-day-period">PER DAY</span>
            </span>
          </button>
          <button class="plan-card featured" data-plan-id="annual">
            <span class="plan-badge accent-badge">MOST POPULAR</span>
            <span class="plan-main">
              <span class="plan-name">12-MONTH PLAN</span>
              <span class="plan-total">$89.99 per year</span>
            </span>
            <span class="plan-side">
              <span class="plan-day-price">$0.25</span>
              <span class="plan-day-period">PER DAY</span>
            </span>
          </button>
        </div>
        <button id="continueCheckout" class="continue-btn">Continue</button>
      </div>
    </section>
    <script src="node_modules/pdfjs-dist/build/pdf.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
